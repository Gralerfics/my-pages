name: Build and deploy Pages

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout my-pages
        uses: actions/checkout@v4

      - name: Checkout my-notes
        uses: actions/checkout@v4
        with:
          repository: Gralerfics/my-notes
          path: external/my-notes
          token: ${{ secrets.NOTES_REPO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: ^0.14.0

      - name: Install
        run: npm ci

      - name: Build with generated notes
        run: npm run build:notes
        env:
          NOTES_REPO_ROOT: ${{ github.workspace }}/external/my-notes
          REQUIRE_TYPST_CLI: "true"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
